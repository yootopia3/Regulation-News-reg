name: v2.0 News Collector (Beta)

on:
  schedule:
    # KST 08:00, 12:00, 18:00 (GitHub cron runs in UTC)
    - cron: '0 23 * * *'
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:  # Keep this for cron-job.org and manual triggers

jobs:
  collect-and-analyze-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Collector (v2 Environment)
      env:
        SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_V2 }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_V2 }}
        SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_V2 }}
        GEMINI_ENABLED: "false"
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        ENV_TYPE: v2
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python src/main.py
